name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    name: Verify version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check tag matches pyproject version
        run: |
          TAG="${{ github.ref_name }}"
          PY_VERSION=$(python -c "
          import tomllib
          with open('py/ruststream-py/pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          if [ "${TAG#v}" != "$PY_VERSION" ]; then
            echo "Tag '$TAG' does not match pyproject.toml version '$PY_VERSION'"
            exit 1
          fi
          echo "Version $PY_VERSION verified"

  wheels:
    name: Wheels ${{ matrix.platform.runner }} ${{ matrix.platform.target }}
    needs: verify
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
          - runner: macos-13
            target: x86_64
          - runner: macos-14
            target: aarch64
          - runner: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          path: ruststream-py

      - uses: actions/checkout@v4
        with:
          repository: powersemmi/ruststream
          persist-credentials: false
          path: ruststream

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ruststream-py
          target: ${{ matrix.platform.target }}
          manylinux: auto
          args: --release --out dist --manifest-path py/ruststream-py/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: ruststream-py/dist

  sdist:
    name: sdist
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          path: ruststream-py

      - uses: actions/checkout@v4
        with:
          repository: powersemmi/ruststream
          persist-credentials: false
          path: ruststream

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ruststream-py
          command: sdist
          args: --out dist --manifest-path py/ruststream-py/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ruststream-py/dist

  pypi:
    name: Publish ruststream to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # Remove `password` after setting up Trusted Publishing on pypi.org
          password: ${{ secrets.PYPI_TOKEN }}

      - name: Generate release notes
        if: github.event_name == 'release'
        run: gh release edit "${{ github.ref_name }}" --generate-notes --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}
